services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fynmanai
      POSTGRES_USER: fynman
      POSTGRES_PASSWORD: fynman
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fynman -d fynmanai"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://fynman:fynman@postgres:5432/fynmanai?schema=public
      FRONTEND_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      API_URL: http://localhost:8000
      JWT_SECRET: docker-jwt-secret
      REFRESH_JWT_SECRET: docker-refresh-jwt-secret
      GOOGLE_CLIENT_ID: docker-google-client-id
      GOOGLE_CLIENT_SECRET: docker-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:8000/auth/google/callback
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      MARKITDOWN_REPO_DIR: /app/.markitdown-src
      MARKITDOWN_VENV_DIR: /app/.venv-markitdown
      DOC_PARSER_PYTHON_PATH: /app/.venv-markitdown/bin/python
      DOC_PARSER_SCRIPT_PATH: /app/src/services/python/parse_document.py
      DOC_PARSER_ENABLE_PLUGINS: "true"
      DOC_PARSER_LLM_MODEL: gpt-4o
      ENABLE_AUDIO_PROCESSING_QUEUE: "true"
      ENABLE_REALTIME_FEEDBACK: "true"
      ENABLE_FINAL_EVALUATION: "true"
      LLM_ANALYSIS_INTERVAL: 30
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 3 http://127.0.0.1:8000/api >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://localhost:8000
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: http://localhost:8000
        NEXT_PUBLIC_WS_PATH: /ws
        SESSION_SECRET_KEY: docker-session-secret
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: http://localhost:8000
      NEXT_PUBLIC_WS_PATH: /ws
      SESSION_SECRET_KEY: docker-session-secret

volumes:
  postgres-data:
  redis-data: